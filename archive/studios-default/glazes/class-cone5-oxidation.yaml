# Default Studio - Class Cone 5 Oxidation Collection
# Studio class glazes for Laguna B-Mix clay body
# Likely products from Laguna Clay Company and Artvark
#
# License: CC-BY-SA-4.0 (Free to use with attribution)

id: default-class-cone5-oxidation
name: Default Studio - Class Cone 5 Oxidation Collection
version: 1.0.0
author: Default Studio
license: CC-BY-SA-4.0
premium: false

description: |
  14 cone 5 oxidation glazes typical of class studio offerings at Default Studio.
  Likely Laguna Clay Company and Artvark dry powder glazes mixed in buckets.
  Electric kiln fired to Orton cone 5 (~2205°F / 1207°C) in oxidation.
  Designed for Laguna B-Mix 5 clay body.

tags:
  - cone5
  - oxidation
  - bmix
  - electric-kiln
  - class-studio
  - long-beach
  - bucket-mixed
  - dry-powder

glazes:
  # ==========================================================================
  # CLEAR / TRANSPARENT
  # ==========================================================================
  - name: Laguna Clear Gloss
    cone: "5"
    atmosphere: oxidation
    base_type: transparent
    surface: smooth
    color: clear
    transparency: transparent
    notes: |
      LIKELY: Laguna Clay Company Clear Gloss (A-Series or similar).
      Standard studio clear for cone 5 oxidation. Reliable over underglazes.
      Mix from dry powder, apply 2-3 medium coats.
      Source: Laguna Clay Company A-Series clear (CONFIDENCE: HIGH)
    recipe:
      - ingredient: Frit 3134
        amount: 30
        unit: "%"
      - ingredient: Nepheline Syenite
        amount: 25
        unit: "%"
      - ingredient: Silica
        amount: 20
        unit: "%"
      - ingredient: Kaolin (EPK)
        amount: 15
        unit: "%"
      - ingredient: Whiting
        amount: 5
        unit: "%"
      - ingredient: Bentonite
        amount: 2
        unit: "%"
      - ingredient: Zinc Oxide
        amount: 3
        unit: "%"

