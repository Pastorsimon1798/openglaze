id: default-cone5-bmix
name: Default Studio - Cone 5 B-Mix Collection
version: 1.0.0
author: Default Studio
license: CC-BY-SA-4.0
premium: false

description: |
  32 professional cone 5 oxidation glazes specifically tested for Laguna B-Mix clay body.
  Used daily at Default Studio pottery studio in Long Beach, CA.
  Electric kiln fired to Orton cone 5 (~2205°F / 1207°C).

tags:
  - cone5
  - oxidation
  - bmix
  - electric-kiln
  - studio-collection
  - long-beach

glazes:
  # ==========================================================================
  # CLEAR / TRANSPARENT
  # ==========================================================================
  - name: Clear Gloss
    cone: "5"
    atmosphere: oxidation
    base_type: transparent
    surface: smooth
    color: clear
    transparency: transparent
    notes: |
      Studio workhorse clear glaze. Reliable over underglazes and slips.
      Best applied at medium thickness - too thick may cause running.
    recipe:
      - ingredient: Frit 3134
        amount: 30
        unit: "%"
      - ingredient: Nepheline Syenite
        amount: 25
        unit: "%"
      - ingredient: Silica
        amount: 20
        unit: "%"
      - ingredient: Kaolin (EPK)
        amount: 15
        unit: "%"
      - ingredient: Whiting
        amount: 5
        unit: "%"
      - ingredient: Bentonite
        amount: 2
        unit: "%"
      - ingredient: Zinc Oxide
        amount: 3
        unit: "%"

