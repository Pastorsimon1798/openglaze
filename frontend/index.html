<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGlaze</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/gamification.css">
    <link rel="stylesheet" href="styles/prediction.css">
    <link rel="stylesheet" href="styles/tips.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <meta name="theme-color" content="#C65D5B">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="menu-toggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="logo">
                <span class="logo-mark">◇</span>
                OpenGlaze
            </div>
        </div>
        <button class="search-trigger" onclick="openCommandPalette()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            Search glazes, combos...
            <kbd>⌘K</kbd>
        </button>
        <div class="header-right">
            <button class="pwa-install-btn" id="pwa-install-btn" onclick="installPWA()">Install</button>
            <button class="kama-trigger btn btn-secondary" onclick="toggleKama()">
                🔮 Ask Kama
            </button>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-label">Views</div>
            <button class="sidebar-item active" data-view="canvas" onclick="switchView('canvas')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                </svg>
                <span>Combinations</span>
            </button>
            <button class="sidebar-item" data-view="glazes" onclick="switchView('glazes')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                </svg>
                <span>All Glazes</span>
            </button>
            <button class="sidebar-item" data-view="photos" onclick="switchView('photos')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span>Photos</span>
            </button>
            <button class="sidebar-item" data-view="studio" onclick="switchView('studio')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Studio</span>
            </button>
            <button class="sidebar-item" data-view="progress" onclick="switchView('progress')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <span>Progress</span>
            </button>
            <button class="sidebar-item" data-view="predictions" onclick="switchView('predictions')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <span>Predictions</span>
            </button>
            <button class="sidebar-item" data-view="tips" onclick="switchView('tips')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>Glaze Basics</span>
            </button>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-section">
            <div class="sidebar-label">Filter by Family</div>
            <button class="sidebar-item family-filter active" data-family="all" onclick="filterByFamily('all')">
                <span class="family-dot all"></span>
                <span>All Families</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Reds" onclick="filterByFamily('Reds')">
                <span class="family-dot reds"></span>
                <span>Reds</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Yellows" onclick="filterByFamily('Yellows')">
                <span class="family-dot yellows"></span>
                <span>Yellows</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Greens" onclick="filterByFamily('Greens')">
                <span class="family-dot greens"></span>
                <span>Greens</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Blues" onclick="filterByFamily('Blues')">
                <span class="family-dot blues"></span>
                <span>Blues</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Purples" onclick="filterByFamily('Purples')">
                <span class="family-dot purples"></span>
                <span>Purples</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Browns" onclick="filterByFamily('Browns')">
                <span class="family-dot browns"></span>
                <span>Browns</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Shinos" onclick="filterByFamily('Shinos')">
                <span class="family-dot shinos"></span>
                <span>Shinos</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Whites" onclick="filterByFamily('Whites')">
                <span class="family-dot whites"></span>
                <span>Whites</span>
            </button>
            <button class="sidebar-item family-filter" data-family="Clears" onclick="filterByFamily('Clears')">
                <span class="family-dot clears"></span>
                <span>Clears</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main">
        <!-- Stage Bar -->
        <div class="stage-bar" id="stage-bar"></div>

        <!-- Canvas -->
        <div class="canvas" id="canvas">
            <!-- Combo cards will be rendered here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state" style="display: none;">
            <div class="empty-icon">◇</div>
            <h2>No combinations yet</h2>
            <p>Create your first glaze combination to start experimenting</p>
            <button class="btn btn-primary" onclick="openCreateModal()">
                + New Combination
            </button>
        </div>
    </main>

    <!-- Kama Panel (hidden by default) -->
    <div id="kama-container"></div>

    <!-- Create Modal -->
    <div class="modal" id="create-modal" style="display: none;">
        <div class="modal-backdrop" onclick="closeCreateModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Combination</h2>
                <button class="modal-close" onclick="closeCreateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Base Glaze (applied first)</label>
                    <div id="base-glaze-autocomplete"></div>
                </div>
                <div class="form-group">
                    <label>Top Glaze (applied last)</label>
                    <div id="top-glaze-autocomplete"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createCombination()">Create</button>
            </div>
        </div>
    </div>

    <!-- Data -->
    <script src="scripts/data.js"></script>
    <!-- API Client -->
    <script src="scripts/api.js"></script>
    <!-- Scripts -->
    <script src="scripts/components/GlazeSwatch.js"></script>
    <script src="scripts/components/GlazeAutocomplete.js"></script>
    <script src="scripts/components/ComboCard.js"></script>
    <script src="scripts/components/StageBar.js"></script>
    <script src="scripts/components/KamaPanel.js"></script>
    <script src="scripts/components/ComboDetailPanel.js"></script>
    <script src="scripts/PhotoUploadForm.js"></script>
    <script src="scripts/PhotoGallery.js"></script>
    <script src="scripts/components/StudioPanel.js"></script>
    <script src="scripts/components/LabQueueBoard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="scripts/components/FiringLogForm.js"></script>
    <script src="scripts/components/GamificationPanel.js"></script>
    <script src="scripts/components/PredictionMarket.js"></script>
    <script src="scripts/components/Leaderboard.js"></script>
    <script src="scripts/components/ProgressTracker.js"></script>
    <script src="scripts/components/GlazeTips.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
