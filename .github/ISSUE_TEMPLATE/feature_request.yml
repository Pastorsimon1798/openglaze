name: Feature Request
description: Suggest a new feature or enhancement for OpenGlaze
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make OpenGlaze better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem are you trying to solve? What is your use case?
      placeholder: I find it difficult to ... when I'm trying to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or enhancement you'd like to see
      placeholder: It would be great if OpenGlaze could ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: I tried doing X instead, but ...

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of OpenGlaze does this relate to?
      options:
        - Chemistry Engine
        - AI / Kama Assistant
        - UI / UX
        - Billing / Payments
        - Studio Management
        - Experiment Pipeline
        - Gamification
        - API / Backend
        - Documentation
        - Self-Hosting / DevOps
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples that might help
      placeholder: Here is a mockup of what I had in mind...

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this feature has not been requested
          required: true
        - label: This feature aligns with OpenGlaze's mission (open-source glaze management)
          required: true
