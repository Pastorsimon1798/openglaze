name: Bug Report
description: Report a bug to help us improve OpenGlaze
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: When I do X, Y happens instead of Z
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: I expected Z to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Instead, Y happened
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or logs to help explain the problem
      placeholder: Paste screenshots or error logs here

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running OpenGlaze?
      options:
        - Docker (self-hosted)
        - Manual install (self-hosted)
        - Experimental cloud/multi-user profile
        - Development (localhost)

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of OpenGlaze are you running?
      placeholder: e.g., v1.2.3 or commit hash

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: What browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
        - N/A (server/API issue)

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this bug has not been reported
          required: true
        - label: I have provided all the information requested above
          required: true
