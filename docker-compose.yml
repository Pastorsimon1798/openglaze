services:
  # =============================================================================
  # MAIN APPLICATION — default single-user self-host mode
  # =============================================================================
  openglaze:
    build: .
    container_name: openglaze
    ports:
      - "${OPENGLAZE_PORT:-8768}:8768"
    environment:
      - OPENGLAZE_MODE=personal
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8768
      - DATABASE_PATH=/data/glaze.db
      - BASE_URL=${BASE_URL:-http://localhost:8768}
      - SECRET_KEY=${SECRET_KEY:-change-me-for-production}
      - FLASK_ENV=${FLASK_ENV:-production}
    volumes:
      - openglaze_data:/data
      - openglaze_uploads:/app/frontend/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8768/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # OPTIONAL CLOUD/MULTI-USER EXPERIMENTAL SERVICES
  # Not used by the default app until PostgreSQL data access is implemented.
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: openglaze-postgres
    profiles: ["cloud"]
    environment:
      - POSTGRES_USER=openglaze
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_DB=openglaze
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openglaze"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kratos:
    image: oryd/kratos:v1.0.0
    container_name: openglaze-kratos
    profiles: ["cloud"]
    ports:
      - "4433:4433"
      - "4434:4434"
    environment:
      - DSN=postgres://openglaze:${POSTGRES_PASSWORD:-change-me}@postgres:5432/openglaze
      - LOG_LEVEL=info
    volumes:
      - ./kratos:/etc/config/kratos:ro
    command: serve -c /etc/config/kratos/config.yml --dev --watch-courier-templates
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kratos-migrate:
    image: oryd/kratos:v1.0.0
    container_name: openglaze-kratos-migrate
    profiles: ["cloud"]
    environment:
      - DSN=postgres://openglaze:${POSTGRES_PASSWORD:-change-me}@postgres:5432/openglaze
    volumes:
      - ./kratos:/etc/config/kratos:ro
    command: migrate -c /etc/config/kratos/config.yml sql -e --yes
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: openglaze-mailhog
    profiles: ["dev", "cloud"]
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: openglaze-nginx
    profiles: ["prod"]
    ports:
      - "${OPENGLAZE_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openglaze
    restart: unless-stopped

  nginx-tls:
    image: nginx:alpine
    container_name: openglaze-nginx-tls
    profiles: ["tls"]
    ports:
      - "${OPENGLAZE_HTTP_PORT:-80}:80"
      - "${OPENGLAZE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.tls.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - openglaze
    restart: unless-stopped

volumes:
  openglaze_data:
  openglaze_uploads:
  postgres_data:

networks:
  default:
    name: openglaze-network
