version: '3.8'

services:
  # =============================================================================
  # MAIN APPLICATION
  # =============================================================================

  openglaze:
    build: .
    container_name: openglaze
    ports:
      - "8768:8768"
    environment:
      - DATABASE_URL=postgres://openglaze:${POSTGRES_PASSWORD}@postgres:5432/openglaze
      - KRATOS_PUBLIC_URL=http://kratos:4433
      - KRATOS_ADMIN_URL=http://kratos:4434
      - BASE_URL=${BASE_URL:-http://localhost:8768}
      - KRATOS_HOOK_KEY=${KRATOS_HOOK_KEY}
      - FLASK_ENV=${FLASK_ENV:-development}
    volumes:
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    depends_on:
      postgres:
        condition: service_healthy
      kratos-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8768/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # DATABASE
  # =============================================================================

  postgres:
    image: postgres:15-alpine
    container_name: openglaze-postgres
    environment:
      - POSTGRES_USER=openglaze
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=openglaze
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openglaze"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # AUTHENTICATION (Ory Kratos)
  # =============================================================================

  kratos:
    image: oryd/kratos:v1.0.0
    container_name: openglaze-kratos
    ports:
      - "4433:4433"  # Public API
      - "4434:4434"  # Admin API
    environment:
      - DSN=postgres://openglaze:${POSTGRES_PASSWORD}@postgres:5432/openglaze
      - LOG_LEVEL=info
    volumes:
      - ./kratos:/etc/config/kratos:ro
    command: serve -c /etc/config/kratos/config.yml --dev --watch-courier-templates
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kratos-migrate:
    image: oryd/kratos:v1.0.0
    container_name: openglaze-kratos-migrate
    environment:
      - DSN=postgres://openglaze:${POSTGRES_PASSWORD}@postgres:5432/openglaze
    volumes:
      - ./kratos:/etc/config/kratos:ro
    command: migrate -c /etc/config/kratos/config.yml sql -e --yes
    depends_on:
      postgres:
        condition: service_healthy

  # =============================================================================
  # EMAIL (Development)
  # =============================================================================

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: openglaze-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped
    profiles:
      - dev

  # =============================================================================
  # REVERSE PROXY (Production)
  # =============================================================================

  nginx:
    image: nginx:alpine
    container_name: openglaze-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - openglaze
      - kratos
    restart: unless-stopped
    profiles:
      - prod

volumes:
  postgres_data:

networks:
  default:
    name: openglaze-network
