# Community Glazes Template
# Traditional and published glazes across cone 6 and cone 10
# All glazes are traditional (centuries-old), published in ceramic literature,
# or generic chemistry (base + colorant). No proprietary or commercial formulas.

id: community-glazes
name: Community Glazes
description: 44 traditional and published glazes across cone 6 and cone 10
firing: Cone 6 Oxidation/Reduction and Cone 10 Reduction
bisque: Electric Kiln Cone 06
version: 2.0.0
created: 2026-03-16
updated: 2026-04-27

glazes:
  # ==========================================
  # CLEARS (Cone 10)
  # ==========================================
  - name: Zinc-Free Clear
    id: zinc-free-clear
    cone: "10"
    atmosphere: reduction
    family: clear
    hex: "#e8e4dc"
    chemistry: "Zinc-free clear glaze — silica, feldspar, whiting base"
    behavior: "Preserves true colors underneath; won't shift copper reds or chrome greens"
    layering: "Excellent over any color; protects surface without color modification"
    food_safe: true
    source: "Published zinc-free clear glaze formulation"

  - name: Zinc Clear
    id: zinc-clear
    cone: "10"
    atmosphere: reduction
    family: clear
    hex: "#f0ebe3"
