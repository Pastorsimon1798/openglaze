    behavior: "Zinc enhances oxide color response; may shift chrome greens to brown"
    layering: "DO NOT use over chrome-tin pinks or chrome greens. Good over copper greens and blues."
    warning: "Contains zinc — destroys chrome-tin pink and shifts chrome green to brown"
    food_safe: true
    source: "Published zinc-containing clear glaze formulation"

